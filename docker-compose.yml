services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ${DATA_PATH:-./data}:/app/data
      - ./config.json:/app/config.json
    depends_on:
      - chromadb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATA_PATH=/app/data
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - CHROMA_URL=http://chromadb:8000

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - with-ollama

  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  ollama_data:
  chroma_data:
